---
- name: Generate kubeadm init configuration file
  template:
    src: kubeadm-init.yaml.j2
    dest: /tmp/kubeadm-init.yaml

- name: Initialize Kubernetes cluster with kubeadm
  command: kubeadm init --config=/tmp/kubeadm-init.yaml
  args:
    creates: /etc/kubernetes/admin.conf

- name: Create .kube directory for ec2-user
  file:
    path: /home/ec2-user/.kube
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: "0755"

- name: Copy admin.conf to ec2-user's kubeconfig
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ec2-user/.kube/config
    remote_src: yes
    owner: ec2-user
    group: ec2-user
    mode: "0644"

- name: Install Calico CNI plugin
  become: false
  command: kubectl apply -f
    https://raw.githubusercontent.com/projectcalico/calico/v3.27.0/manifests/calico.yaml
  environment:
    KUBECONFIG: /home/ec2-user/.kube/config

- name: Get kubeadm join command
  command: kubeadm token create --print-join-command
  register: join_command

- name: Save join command to a local file
  copy:
    content: "{{ join_command.stdout }}"
    dest: /tmp/k8s_join_command.sh
    mode: "0600"
  delegate_to: localhost
  become: false
